<!DOCTYPE html>
<html>
<head>
    <title>Complete Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">Complete Your Profile</h2>

        <form method="POST">

            <label>CGPA</label>
            <input type="number"
                   step="0.01"
                   min="0"
                   max="10"
                   name="cgpa"
                   class="form-control"
                   required>

            <br>

            <label>Skills</label>
            <input type="text"
                   name="skills"
                   placeholder="Python, SQL, Java"
                   class="form-control"
                   required>

            <br>

            <label>Interests</label>
            <input type="text"
                   name="interests"
                   placeholder="Web Development, Data Analytics"
                   class="form-control"
                   required>

            <br>

            <label>Target Role</label>
            <select name="target_role" class="form-control">
                <option>Data Analyst</option>
                <option>Web Developer</option>
                <option>Software Developer</option>
                <option>AI Engineer</option>
            </select>

            <br>

            <label>Aptitude Score</label>
            <input type="number"
                   min="0"
                   max="100"
                   name="aptitude_score"
                   class="form-control"
                   required>

            <br>

            <label>Communication Score</label>
            <input type="number"
                   min="0"
                   max="100"
                   name="communication_score"
                   class="form-control"
                   required>

            <br>

            <button type="submit" class="btn btn-primary">
                Save Profile
            </button>

        </form>

    </div>

</div>

</body>
</html>
