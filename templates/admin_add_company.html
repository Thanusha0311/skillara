<!DOCTYPE html>
<html>
<head>
    <title>Add Companies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f7fc;">

<div class="container mt-5">

    <div class="card shadow border-0 rounded-4 p-4">
        <h2>Add Company</h2>

        <form method="POST">

            <label>Company Name</label>
            <input type="text" name="name" class="form-control" placeholder="Infosys" required>

            <br>

            <label>Minimum CGPA</label>
            <input type="number" step="0.1" min="0" max="10" name="min_cgpa" class="form-control" required>

            <br>

            <label>Required Skills</label>
            <input type="text" name="skills" class="form-control" placeholder="python, sql, aptitude" required>

            <br>

            <button class="btn btn-primary">Add Company</button>
            <a href="/admin-dashboard" class="btn btn-secondary">Back</a>

        </form>
    </div>

    <div class="card shadow border-0 rounded-4 p-4 mt-4">
        <h3>Existing Companies</h3>

        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Company</th>
                    <th>Minimum CGPA</th>
                    <th>Required Skills</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for c in companies %}
                <tr>
                    <td>{{ c.name }}</td>
                    <td>{{ c.min_cgpa }}</td>
                    <td>{{ c.skills }}</td>
                    <td>
    <a href="/delete-company/{{ c._id }}"
       class="btn btn-danger btn-sm">
       Delete
    </a>
</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
