<!DOCTYPE html>
<html>
<head>
    <title>Skillara</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #2563eb, #1e293b);
            min-height: 100vh;
            color: white;
        }

        .hero{
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-box{
            background: white;
            color: #1e293b;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .title{
            font-size: 55px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container hero">
    <div class="row align-items-center w-100">

        <div class="col-md-7">
            <h1 class="title">Skillara</h1>

            <h3 class="mt-3">
                Smart AI Career Guidance and Placement Readiness System
            </h3>

            <p class="mt-4 fs-5">
                Analyze your skills, find missing areas, get career guidance,
                company recommendations, and improve placement readiness.
            </p>
        </div>

        <div class="col-md-5">
            <div class="card-box text-center">

                <h2>Get Started</h2>

                <p class="text-muted">
                    Build your career path with AI guidance
                </p>

                <a href="/register" class="btn btn-primary btn-lg w-100 mt-3">
                    Register
                </a>

                <a href="/login" class="btn btn-outline-primary btn-lg w-100 mt-3">
                    Login
                </a>
                <a href="/admin-login"
                class="btn btn-dark btn-lg w-100 mt-3">

                    Admin Login

                </a>

            </div>
        </div>

    </div>
</div>

</body>
</html>
