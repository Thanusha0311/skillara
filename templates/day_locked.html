<!DOCTYPE html>
<html>
<head>
    <title>Day Locked</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f7fc;">

<div class="container mt-5">

    <div class="card shadow border-0 rounded-4 p-5 text-center">

        <h2>🔒 Day {{ day }} is Locked</h2>

        <p class="mt-3">
            Please complete Day {{ previous_day }} before opening Day {{ day }}.
        </p>

        <a href="/placement-plan/{{ previous_day }}" class="btn btn-primary">
            Go to Day {{ previous_day }}
        </a>

        <a href="/dashboard" class="btn btn-secondary">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
