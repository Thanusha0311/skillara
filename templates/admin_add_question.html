<!DOCTYPE html>
<html>
<head>
    <title>Add Mock Questions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f7fc;">

<div class="container mt-5">

    <div class="card shadow border-0 rounded-4 p-4">

        <h2>Add Mock Interview Question</h2>

        <form method="POST">

            <label>Role</label>
            <select name="role" class="form-control" required>
                <option>Web Developer</option>
                <option>Data Analyst</option>
                <option>Software Developer</option>
                <option>AI Engineer</option>
                <option>General</option>
            </select>

            <br>

            <label>Question</label>
            <input type="text" name="question" class="form-control" required>

            <br>

            <label>Answer Keywords</label>
            <input type="text" name="answer" class="form-control" placeholder="example: styling design css" required>

            <br>

            <button class="btn btn-primary">Add Question</button>

            <a href="/admin-dashboard" class="btn btn-secondary">Back</a>

        </form>

    </div>

    <div class="card shadow border-0 rounded-4 p-4 mt-4">

        <h3>Existing Questions</h3>

        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Role</th>
                    <th>Question</th>
                    <th>Answer Keywords</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for q in questions %}
                <tr>
                    <td>{{ q.role }}</td>
                    <td>{{ q.question }}</td>
                    <td>{{ q.answer }}</td>
                    <td>
    <a href="/delete-question/{{ q._id }}"
       class="btn btn-danger btn-sm">
       Delete
    </a>
</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
