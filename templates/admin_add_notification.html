<!DOCTYPE html>
<html>
<head>
    <title>Add Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f7fc;">

<div class="container mt-5">

    <div class="card shadow border-0 rounded-4 p-4">

        <h2>Add Notification</h2>

        <form method="POST">

            <label>Title</label>
            <input type="text" name="title" class="form-control" required>

            <br>

            <label>Message</label>
            <textarea name="message" class="form-control" required></textarea>

            <br>

            <button class="btn btn-primary">Post Notification</button>
            <a href="/admin-dashboard" class="btn btn-secondary">Back</a>

        </form>

    </div>

    <div class="card shadow border-0 rounded-4 p-4 mt-4">

        <h3>Existing Notifications</h3>

        {% for n in notifications %}
            <div class="alert alert-info">
                <b>{{ n.title }}</b><br>
                {{ n.message }}
            </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
