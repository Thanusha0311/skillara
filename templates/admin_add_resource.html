<!DOCTYPE html>
<html>
<head>
    <title>Add Learning Resources</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f7fc;">

<div class="container mt-5">

    <div class="card shadow border-0 rounded-4 p-4">

        <h2>Add Learning Resource</h2>

        <form method="POST">

            <label>Skill</label>
            <input type="text" name="skill" class="form-control" placeholder="Example: SQL" required>

            <br>

            <label>Resource URL</label>
            <input type="url" name="url" class="form-control" placeholder="https://example.com" required>

            <br>

            <button class="btn btn-primary">Add Resource</button>

            <a href="/admin-dashboard" class="btn btn-secondary">Back</a>

        </form>

    </div>

    <div class="card shadow border-0 rounded-4 p-4 mt-4">

        <h3>Existing Resources</h3>

        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Skill</th>
                    <th>URL</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for r in resources %}
                <tr>
                    <td>{{ r.skill }}</td>
                    <td>
                        <a href="{{ r.url }}" target="_blank">
                            {{ r.url }}
                        </a>
                    </td>
                    <td>
    <a href="/delete-resource/{{ r._id }}"
       class="btn btn-danger btn-sm">
       Delete
    </a>
</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
